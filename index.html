<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinValeuta</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#111;
  color:white;
}

/* ☰ uch chiziq */
.menu-btn{
  font-size:28px;
  padding:12px 16px;
  cursor:pointer;
}

/* Yon menu */
.side-menu{
  height:100%;
  width:0;
  position:fixed;
  top:0;
  left:0;
  background:#222;
  overflow-x:hidden;
  transition:0.3s;
  padding-top:60px;
  z-index:1000;
}
.side-menu a{
  padding:12px 24px;
  text-decoration:none;
  color:white;
  display:block;
  border-bottom:1px solid #333;
}
.side-menu a:hover{
  background:#333;
}
.close-btn{
  position:absolute;
  top:10px;
  right:20px;
  font-size:28px;
  cursor:pointer;
}

/* Profil va coin */
.profile{
  padding:15px 20px;
  display:flex;
  align-items:center;
}
.profile img{
  width:50px;
  height:50px;
  border-radius:50%;
  border:2px solid gold;
  margin-right:12px;
}
.coin{
  background:#222;
  padding:4px 8px;
  border-radius:12px;
  margin-left:auto;
  font-weight:bold;
}

/* Katta karta tugmalar */
.card-container{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:15px;
  padding:20px;
}
.card{
  background:#1a1a1a;
  border-radius:12px;
  padding:15px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}
.card:hover{
  background:#333;
}
.card img{
  width:60px;
  height:60px;
  margin-bottom:10px;
}

/* Kartalar nomi */
.card span{
  font-size:14px;
  font-weight:bold;
}

</style>
</head>
<body>

<!-- ☰ Menu -->
<span class="menu-btn" onclick="openMenu()">☰</span>

<div id="menu" class="side-menu">
  <span class="close-btn" onclick="closeMenu()">×</span>
  
  <div class="profile">
    <img src="profile.png" alt="Profil">
    <div>
      <div>M</div>
      <small>gtmiyri@gmail.com</small>
    </div>
    <div class="coin">318 🪙</div>
  </div>
  
  <a href="#">Home</a>
  <a href="#">Redeem Now</a>
  <a href="#">History</a>
  <a href="#">Share</a>
  <a href="#">Privacy Policy</a>
  <a href="#">Logout</a>
</div>

<!-- Karta tugmalar -->
<div class="card-container">
  <div class="card">
    <img src="checkin.png" alt="Checkin">
    <span>Checkin</span>
  </div>
  <div class="card">
    <img src="math.png" alt="Math Quiz">
    <span>Math Quizzes</span>
  </div>
  <div class="card">
    <img src="emoji.png" alt="Emoji Quiz">
    <span>Emoji Quizzes</span>
  </div>
  <div class="card">
    <img src="learn.png" alt="Learn Quiz">
    <span>Learn Quiz</span>
  </div>
  <div class="card">
    <img src="invite.png" alt="Invite & Earn">
    <span>Invite & Earn</span>
  </div>
  <div class="card">
    <img src="special.png" alt="Special Offers">
    <span>Special Offers</span>
  </div>
</div>

<script>
function openMenu(){
  document.getElementById("menu").style.width="250px";
}
function closeMenu(){
  document.getElementById("menu").style.width="0";
}
</script>

</body>
</html>
