<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Metro Runner</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #4facfe, #00f2fe);
      overflow: hidden;
    }

    #startScreen {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.6);
      color: white;
    }

    #startScreen h1 {
      font-size: 50px;
      margin-bottom: 20px;
    }

    #startBtn {
      padding: 15px 40px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      background: orange;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    #startBtn:hover {
      background: red;
    }

    #gameCanvas {
      display: none;
      background: lightgray;
    }
  </style>
</head>
<body>

<div id="startScreen">
  <h1>Metro Runner</h1>
  <button id="startBtn">START</button>
</div>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
  const startBtn = document.getElementById("startBtn");
  const startScreen = document.getElementById("startScreen");
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");

  startBtn.onclick = () => {
    startScreen.style.display = "none";
    canvas.style.display = "block";
    startGame();
  };

  function startGame() {
    let x = 50;

    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // player
      ctx.fillStyle = "blue";
      ctx.fillRect(x, 300, 50, 50);

      x += 2;

      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  }
</script>

</body>
</html>
