<!DOCTYPE html>
<html>
<head>
<title>CoinVault</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

.header{
background:#FFD700;
padding:15px;
font-size:24px;
font-weight:bold;
}

.coin{
font-size:22px;
margin:20px;
}

button{
width:200px;
padding:15px;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
background:#FFD700;
}

.redeem{
background:#4CAF50;
color:white;
}

</style>
</head>

<body>

<div class="header">CoinVault</div>

<div class="coin">
Coins: <span id="coin">0</span>
</div>

<button onclick="win()">Math Game</button>

<button onclick="win()">Capital Game</button>

<button onclick="win()">Quiz Game</button>

<br>

<button class="redeem" onclick="redeem()">Redeem ₹10</button>

<script>

var coin=0;

function win(){
coin+=10;
document.getElementById("coin").innerHTML=coin;
alert("You win 10 coins!");
}

function redeem(){
if(coin>=2000){
coin-=2000;
document.getElementById("coin").innerHTML=coin;
alert("Code: CGT69J94NUCW7CZE");
}else{
alert("Not enough coins");
}
}

</script>

</body>
</html>
