<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeleBail Full</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0c29;
color:white;
}

/* AUTH */
.container{
width:90%;
max-width:400px;
margin:80px auto;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:20px;
}

input,button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
}

button{
background:linear-gradient(90deg,red,purple,blue);
color:white;
font-weight:bold;
}

.hidden{display:none}

/* CHAT UI */
#chatApp{
display:none;
}

.header{
padding:15px;
font-size:20px;
font-weight:bold;
}

.search-box input{
background:rgba(255,255,255,0.1);
color:white;
}

.chat{
display:flex;
padding:10px;
margin:10px;
background:rgba(255,255,255,0.05);
border-radius:10px;
cursor:pointer;
}

.chat img{
width:40px;
height:40px;
border-radius:50%;
margin-right:10px;
}

.chat-window{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#111;
padding:20px;
}

</style>
</head>
<body>

<!-- LOGIN -->
<div class="container" id="auth">

<h2>TeleBail</h2>

<input type="text" id="email" placeholder="email@bail.com">
<input type="password" id="pass" placeholder="parol">

<button onclick="login()">Kirish</button>

<p onclick="register()">Ro'yxatdan o'tish</p>

</div>

<!-- CHAT APP -->
<div id="chatApp">

<div class="header">TeleBail Chat</div>

<div class="search-box">
<input type="text" id="search" placeholder="Search...">
</div>

<div id="chatList">

<div class="chat" onclick="openChat('Admin')">
<img src="https://i.pravatar.cc/150?img=5">
<div>Admin</div>
</div>

<div class="chat" onclick="openChat('Support')">
<img src="https://i.pravatar.cc/150?img=10">
<div>Support</div>
</div>

</div>

</div>

<!-- CHAT WINDOW -->
<div class="chat-window" id="chatWindow">
<button onclick="closeChat()">⬅ Back</button>
<h3 id="chatTitle"></h3>
<p>Chat hali ishlanmoqda...</p>
</div>

<script>

function register(){
let email = prompt("Email kiriting (@bail.com)");
let pass = prompt("Parol (6+)");

if(!email.endsWith("@bail.com")) return alert("Xato email");

localStorage.setItem("email",email);
localStorage.setItem("pass",pass);

alert("Ro'yxatdan o'tdi");
}

function login(){
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

if(email===localStorage.getItem("email") &&
   pass===localStorage.getItem("pass")){

document.getElementById("auth").style.display="none";
document.getElementById("chatApp").style.display="block";

}else{
alert("Xato");
}
}

function openChat(name){
document.getElementById("chatWindow").style.display="block";
document.getElementById("chatTitle").innerText=name;
}

function closeChat(){
document.getElementById("chatWindow").style.display="none";
}

</script>

</body>
</html>
