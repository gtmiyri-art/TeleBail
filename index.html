
<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>IT Platforma</title>

<style>
body {
    font-family: Arial;
    margin: 0;
}

/* LOGIN */
#loginPage {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to right, #4facfe, #00f2fe);
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
    position: relative;
}

.login-name {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 12px;
    color: gray;
}

.login-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

.login-box button {
    width: 100%;
    padding: 10px;
    background: blue;
    color: white;
    border: none;
}

.avatar {
    width: 80px;
}

/* MAIN */
#mainPage {
    display: none;
}

header {
    background: #1e90ff;
    color: white;
    padding: 15px;
    position: relative;
}

.lang {
    position: absolute;
    top: 10px;
    right: 15px;
}

/* HERO */
.hero {
    display: flex;
    justify-content: space-between;
    padding: 50px;
    background: linear-gradient(to right, #1e90ff, #00bfff);
    color: white;
    position: relative;
}

.center-name {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    font-weight: bold;
}

.hero img {
    width: 300px;
    border-radius: 10px;
}

/* CARDS */
.cards {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 40px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    width: 200px;
    text-align: center;
    cursor: pointer;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card:hover {
    transform: scale(1.05);
}

/* INFO PAGE */
#infoPage {
    display: none;
    padding: 40px;
}

#infoPage img {
    width: 400px;
    border-radius: 10px;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
    <div class="login-box">
        <div class="login-name">Atabaev Miyribek</div>
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="avatar">
        <h2>Kirish</h2>

        <!-- ID qo‘shildi -->
        <input type="text" id="username" placeholder="Login">
        <input type="password" id="password" placeholder="Parol">

        <button onclick="login()">Kirish</button>
    </div>
</div>

<!-- MAIN -->
<div id="mainPage">
<header>
    <h2>IT Platforma</h2>

    <div class="lang">
        <select onchange="changeLang(this.value)">
            <option value="uz">UZ</option>
            <option value="ru">RU</option>
            <option value="en">EN</option>
        </select>
    </div>
</header>

<section class="hero">

    <div class="center-name">Atabaev Miyribek</div>

    <div>
        <h1 id="titleMain">Kelajakdagi kasbingizni toping!</h1>
        <p id="descMain">Informatika va IT ni o‘rganing</p>
        <button onclick="showIT()">Boshlash</button>
    </div>

    <img src="https://images.unsplash.com/photo-1518770660439-4636190af475">
</section>

<section class="cards">
    <div class="card" onclick="showInfo('informatika')">
        <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c">
        <h3>Informatika</h3>
    </div>

    <div class="card" onclick="showInfo('dasturlash')">
        <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c">
        <h3>Dasturlash</h3>
    </div>

    <div class="card" onclick="showInfo('web')">
        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
        <h3>Web Texnologiya</h3>
    </div>
</section>
</div>

<!-- INFO PAGE -->
<div id="infoPage">
    <h1 id="title"></h1>
    <img id="image">
    <p id="text"></p>
    <br>
    <button onclick="back()">Orqaga</button>
</div>

<script>

function login(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    // 🔥 SHU YANGI TEKSHIRUV
    if(user === "" || pass === ""){
        alert("Login va parolni kiriting!");
        return;
    }

document.getElementById("loginPage").style.display = "none";
    document.getElementById("mainPage").style.display = "block";
}

function showIT(){
    document.getElementById("mainPage").style.display = "none";
    document.getElementById("infoPage").style.display = "block";

    title.innerText = "IT haqida";
    image.src = "https://images.unsplash.com/photo-1518770660439-4636190af475";
    text.innerText =
    "IT (Information Technology) — bu axborot texnologiyalari degani bo‘lib...";
}

function showInfo(type){
    document.getElementById("mainPage").style.display = "none";
    document.getElementById("infoPage").style.display = "block";

    if(type === "informatika"){
        title.innerText = "Informatika";
        image.src = "https://images.unsplash.com/photo-1519389950473-47ba0277781c";
        text.innerText = "Informatika — axborot bilan ishlash fanidir.";
    }

    if(type === "dasturlash"){
        title.innerText = "Dasturlash";
        image.src = "https://images.unsplash.com/photo-1555066931-4365d14bab8c";
        text.innerText = "Dasturlash — kompyuterga buyruq berish.";
    }

    if(type === "web"){
        title.innerText = "Web Texnologiya";
        image.src = "https://images.unsplash.com/photo-1498050108023-c5249f4df085";
        text.innerText = "Web — sayt yaratish texnologiyasi.";
    }
}

function back(){
    document.getElementById("infoPage").style.display = "none";
    document.getElementById("mainPage").style.display = "block";
}

function changeLang(lang){
    if(lang=="en"){
        titleMain.innerText="Find your future profession!";
        descMain.innerText="Learn IT";
    }
    if(lang=="ru"){
        titleMain.innerText="Найди свою профессию!";
        descMain.innerText="Изучай IT";
    }
    if(lang=="uz"){
        titleMain.innerText="Kelajakdagi kasbingizni toping!";
        descMain.innerText="Informatika va IT ni o‘rganing";
    }
}

</script>

</body>
</html>
