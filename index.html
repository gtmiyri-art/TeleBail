<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>CoinValuta</title>
<style>
body { font-family:sans-serif; margin:0; padding:0; background:#fff8dc; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
.hidden { display:none; }
#coin { width:150px; height:150px; border-radius:50%; background:gold; display:flex; justify-content:center; align-items:center; font-size:48px; font-weight:bold; color:white; animation:spin 10s linear forwards; margin-bottom:20px; }
@keyframes spin { from { transform:rotate(0deg);} to { transform:rotate(3600deg);} }
button { padding:10px 20px; margin:5px; font-size:16px; cursor:pointer; border-radius:5px; border:none; background:#ff8c00; color:white; }
input { padding:10px; font-size:16px; margin:10px; width:80%; border-radius:5px; }
h1,h2 { text-align:center; }
ul { list-style:none; padding:0; }
li { margin:5px 0; }
</style>
</head>
<body>

<!-- Scratch Loading -->
<div id="loading">
  <div id="coin">M</div>
  <h2>Loading...</h2>
</div>

<!-- Sign In -->
<div id="signin" class="hidden">
  <h1>CoinValuta</h1>
  <button onclick="login()">Sign In with Google</button>
</div>

<!-- Home -->
<div id="home" class="hidden">
  <h1>CoinValuta</h1>
  <p>Coins: <span id="coins">0</span></p>
  <p>Level: <span id="level">1</span></p>
  <button onclick="playGame('color')">Rang O‘yini</button>
  <button onclick="playGame('math')">Matematika O‘yini</button>
  <button onclick="playGame('flag')">Mamlakat Bayrog‘i</button>
  <button onclick="redeem()">Redeem Code</button>
  <button onclick="promo()">Promo Code</button>
  <button onclick="share()">Share App Link</button>
  <button onclick="privacy()">Privacy Policy</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- Redeem Code -->
<div id="redeem" class="hidden">
  <h1>Redeem Code</h1>
  <ul>
    <li>₹10 - 2000 coin</li>
    <li>10 IDR - 3000 coin</li>
    <li>€1 - 3500 coin</li>
    <li>£1 - 5000 coin</li>
    <li>50 TRY - 4000 coin</li>
    <li>$4 - 11000 coin</li>
    <li>$5 - 15000 coin</li>
  </ul>
  <button onclick="backHome()">Orqaga</button>
</div>

<!-- Promo Code -->
<div id="promo" class="hidden">
  <h1>Promo Code</h1>
  <input type="text" placeholder="Promo code yozing">
  <button onclick="joinNow()">Join Now</button>
  <button onclick="backHome()">Orqaga</button>
</div>

<script>
// initial
let coins = 0;
let level = 1;

// Scratch Loading -> Sign In
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('signin').classList.remove('hidden');
}, 10000);

// Sign In
function login(){
  alert('Google Sign In ishlaydi (mock)');
  document.getElementById('signin').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
}

// Games
function playGame(type){
  coins += 10;
  document.getElementById('coins').innerText = coins;
  alert(type + ' o‘yini o‘ynaldi, 10 coin olindi!');
  if(coins >= level*50){ level++; document.getElementById('level').innerText = level; }
}

// Redeem Code
function redeem(){
  document.getElementById('home').classList.add('hidden');
  document.getElementById('redeem').classList.remove('hidden');
}

// Promo Code
function promo(){
  document.getElementById('home').classList.add('hidden');
  document.getElementById('promo').classList.remove('hidden');
}
function joinNow(){
  alert('Telegram kanalga o‘tadi (mock)');
}

// Share App
function share(){ alert('Share App Link ishlaydi (mock)'); }

// Privacy Policy
function privacy(){ alert('Privacy Policy sahifasi ishlaydi (mock)'); }

// Logout
function logout(){
  if(confirm('Chiqmoqchimisiz?')){
    document.getElementById('home').classList.add('hidden');
    document.getElementById('signin').classList.remove('hidden');
  }
}

// Back to Home
function backHome(){
  document.getElementById('redeem').classList.add('hidden');
  document.getElementById('promo').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
}
</script>
</body>
</html>
